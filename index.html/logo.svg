<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: 'Arial', sans-serif; font-weight: 300; fill: white; }
    </style>
  </defs>
  
  <!-- Slate blue background -->
  <rect width="500" height="500" fill="#5a7a8a"/>
  
  <!-- Top arc (circle outline) -->
  <path d="M 140 180 A 110 110 0 0 1 360 180" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Bottom arc (circle outline) -->
  <path d="M 360 340 A 110 110 0 0 1 140 340" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Vertical dividing line -->
  <line x1="250" y1="150" x2="250" y2="370" stroke="white" stroke-width="9" stroke-linecap="round"/>
  
  <!-- Left S -->
  <text x="180" y="270" class="logo-text" font-size="110" text-anchor="middle" dominant-baseline="middle" font-weight="300">S</text>
  
  <!-- Right S -->
  <text x="320" y="270" class="logo-text" font-size="110" text-anchor="middle" dominant-baseline="middle" font-weight="300">S</text>
</svg>